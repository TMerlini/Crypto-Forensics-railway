services:
  - type: web
    name: sweeper-forensics
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node src/server.mjs
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: AUTH_PASSWORD
        sync: false
      - key: AUTH_USER
        value: admin
      - key: ETHERSCAN_API_KEY
        sync: false
      # Per-chain free keys (optional). Set whichever chains you trace on.
      - key: BASESCAN_API_KEY
        sync: false
      - key: ARBISCAN_API_KEY
        sync: false
      - key: OPTIMISTIC_ETHERSCAN_API_KEY
        sync: false
      - key: POLYGONSCAN_API_KEY
        sync: false
      - key: BSCSCAN_API_KEY
        sync: false
      - key: CHAIN_ID
        value: "1"
      - key: DIRECTION
        value: both
      - key: MAX_DEPTH
        value: "5"
      - key: MAX_ADDRESSES
        value: "500"
      - key: ETHERSCAN_MAX_ROWS
        value: "30000"
      - key: RATE_LIMIT_RPS
        value: "4"
      - key: STOP_AT_ORIGIN
        value: "true"
